name: hydrate

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hydrate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout main (for scripts)
        uses: actions/checkout@v4
        with:
          path: main

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: clone repo for data branch
        run: |
          git config --global user.name "hydrate-bot"
          git config --global user.email "actions@github.com"
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" data-repo

      - name: checkout or init data branch
        working-directory: data-repo
        run: |
          if git ls-remote --exit-code --heads origin data; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

      - name: run hydrate
        working-directory: data-repo
        run: node ../main/scripts/hydrate.js

      - name: commit & push if changed
        working-directory: data-repo
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "hydrate $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin data
