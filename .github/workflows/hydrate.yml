name: hydrate

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  hydrate:
    runs-on: ubuntu-latest
    steps:
      - name: clone repo
        run: |
          git config --global user.name "hydrate-bot"
          git config --global user.email "actions@github.com"
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" repo

      - name: checkout or init data branch
        working-directory: repo
        run: |
          if git ls-remote --exit-code --heads origin data; then
            git checkout data
          else
            git checkout --orphan data
            git rm -rf . 2>/dev/null || true
          fi

      # ──────────────────────────────────────────────────────────────
      # add fetch steps here. each writes a JSON file into ./repo/
      # and appends an entry to the sources array below.
      # use `continue-on-error: true` so one failure doesn't block others.
      # example:
      #   - name: fetch github
      #     working-directory: repo
      #     continue-on-error: true
      #     env:
      #       GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     run: ./scripts/fetch-github.sh > github.json
      # ──────────────────────────────────────────────────────────────

      - name: write manifest
        working-directory: repo
        run: |
          cat > manifest.json <<EOF
          {
            "updated": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "sources": []
          }
          EOF

      - name: commit & push if changed
        working-directory: repo
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git commit -m "hydrate $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin data
