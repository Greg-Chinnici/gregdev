<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>blog · greg chinnici</title>
  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (!t) t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="/css/themes.css">
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">greg chinnici</a>
    <nav>
      <a href="/blog/" aria-current="page">blog</a>
    </nav>
    <button data-theme-toggle aria-label="cycle theme">
      <span data-theme-label></span>
    </button>
  </header>

  <main>
    <section class="intro">
      <h1>blog</h1>
      <p class="muted">posts will be rendered from a <code>/posts/*.md</code> folder. not wired up yet.</p>
    </section>

    <section>
      <ul class="post-list" data-post-list>
        <li class="muted">no posts yet.</li>
      </ul>
    </section>
  </main>

  <footer class="site-footer">
    <p class="muted">built static. <a href="https://github.com/greg-chinnici">github</a></p>
  </footer>

  <script src="/js/theme.js"></script>
</body>
</html>
